<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->

    <meta name="description" content="LogixMitra - Smart logistics, order management, COD & finance tracking" />

    <meta property="og:title" content="LogixMitra" />

     <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
    }

    /* GLOBAL LOADER */
    #gg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;

      background: rgba(255, 255, 255, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999999;
      backdrop-filter: blur(3px);
      visibility: hidden;
    }

    .loader {
      width: 60px;
      height: 60px;
      border: 6px solid #e5e5e5;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .content {
      padding: 40px;
    }

    button {
      padding: 12px 20px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
